name: Download Mono Debs
on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-20.04
    steps:
      - name: Prepare tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-rdepends gnupg ca-certificates

      - name: Add Mono repo key
        run: |
          sudo gpg --homedir /tmp --no-default-keyring \
            --keyring gnupg-ring:/usr/share/keyrings/mono-official-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys 3FA7E0328081BFF6A14DA29AA6A19B38D3D831EF

      - name: Add Mono repo
        run: |
          echo "deb [signed-by=/usr/share/keyrings/mono-official-archive-keyring.gpg] https://download.mono-project.com/repo/ubuntu stable-focal main" | sudo tee /etc/apt/sources.list.d/mono.list
          sudo apt-get update

      - name: Download mono-complete dependencies
        run: |
          mkdir -p mono
          cd mono
          apt-get download $(apt-rdepends mono-complete 2>/dev/null | grep -v "^ " | sort -u)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mono-debs
          path: mono/*.deb
